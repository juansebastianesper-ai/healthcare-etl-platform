{% extends 'base.html' %}
{% block title %}Reportes{% endblock %}
{% load static %}
{% block content %}
<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="bi bi-file-earmark-text"></i> Generación de Reportes</h2>
    </div>

    <div class="row g-4">
        <div class="col-md-4">
            <div class="card">
                <div class="card-body text-center">
                    <i class="bi bi-filetype-pdf text-danger" style="font-size: 3rem;"></i>
                    <h5 class="mt-2">Reporte General PDF</h5>
                    <p class="text-muted">Reporte completo con pacientes, ETL y ML</p>
                    <a href="/api/reports/pdf/general/" class="btn btn-danger w-100">
                        <i class="bi bi-download"></i> Descargar PDF
                    </a>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card">
                <div class="card-body text-center">
                    <i class="bi bi-filetype-pdf text-danger" style="font-size: 3rem;"></i>
                    <h5 class="mt-2">Reporte Pacientes PDF</h5>
                    <p class="text-muted">Distribución y estadísticas de pacientes</p>
                    <a href="/api/reports/pdf/pacientes/" class="btn btn-outline-danger w-100">
                        <i class="bi bi-download"></i> Descargar PDF
                    </a>
                </div>
            </div>
        </div>

    </div>
</div>
{% endblock %}
