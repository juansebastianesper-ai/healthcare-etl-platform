{% extends 'base.html' %}
{% block title %}Perfil{% endblock %}
{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card">
                <div class="card-header">
                    <h4 class="mb-0"><i class="bi bi-person-circle"></i> Mi Perfil</h4>
                </div>
                <div class="card-body">
                    <form id="profileForm">
                        {% csrf_token %}
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Usuario</label>
                                <input type="text" class="form-control" value="{{ user.username }}" disabled>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Rol</label>
                                <input type="text" class="form-control" value="{{ user.get_role_display }}" disabled>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label" for="firstName">Nombre</label>
                                <input type="text" class="form-control" id="firstName" name="first_name" value="{{ user.first_name }}">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label" for="lastName">Apellido</label>
                                <input type="text" class="form-control" id="lastName" name="last_name" value="{{ user.last_name }}">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label" for="email">Email</label>
                                <input type="email" class="form-control" id="email" name="email" value="{{ user.email }}">
                            </div>
                        </div>
                        <div class="mt-4">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-lg"></i> Guardar Cambios
                            </button>
                        </div>
                    </form>
                    <hr>
                    <h5><i class="bi bi-shield-lock"></i> Cambiar Contraseña</h5>
                    <form id="passwordForm">
                        {% csrf_token %}
                        <div class="row g-3">
                            <div class="col-md-4">
                                <label class="form-label" for="currentPassword">Contraseña actual</label>
                                <input type="password" class="form-control" id="currentPassword" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label" for="newPassword">Nueva contraseña</label>
                                <input type="password" class="form-control" id="newPassword" required minlength="8">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label" for="confirmPassword">Confirmar</label>
                                <input type="password" class="form-control" id="confirmPassword" required minlength="8">
                            </div>
                        </div>
                        <div class="mt-3">
                            <button type="submit" class="btn btn-warning">
                                <i class="bi bi-key"></i> Cambiar Contraseña
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
{% load static %}
<script src="{% static 'js/profile.js' %}"></script>
{% endblock %}
