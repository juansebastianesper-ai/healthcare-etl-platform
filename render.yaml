databases:
  - name: healthcare-db
    plan: free

services:
  - type: web
    name: healthcare-etl-platform
    runtime: python
    plan: free
    buildCommand: cd backend && pip install -r requirements.txt && mkdir -p staticfiles && python manage.py collectstatic --noinput
    startCommand: cd backend && python manage.py migrate --noinput && python manage.py seed_users && python manage.py fix_patient_sexo && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    healthCheckPath: /api/health/
    envVars:
      - key: DJANGO_SECRET_KEY
        value: -p)l6@8ot@f&n-v%@atr)tfp5lhwsnn&$i3t4^0l$e(n8tmdry
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com,localhost,127.0.0.1"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com,http://localhost:8000"
      - key: USE_POSTGRES
        value: "True"
      - key: DATABASE_URL
        fromDatabase:
          name: healthcare-db
          property: connectionString
      - key: DB_NAME
        fromDatabase:
          name: healthcare-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: healthcare-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: healthcare-db
          property: password
      - key: DB_HOST
        fromDatabase:
          name: healthcare-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: healthcare-db
          property: port
